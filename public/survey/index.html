<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<title>Neuroom — Опрос: экран заданий</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<style>
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --accent: #7c5cfc;
  --accent-light: #a78bfa;
  --accent-glow: rgba(124,92,252,.3);
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --success: #34d399;
  --border: #2a2a40;
  --input-bg: #12121f;
  --radius: 16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;height:-webkit-fill-available}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;min-height:-webkit-fill-available;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}

/* ── Bg ── */
.bg-layer{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:bd 20s ease-in-out infinite alternate}
.blob-1{width:300px;height:300px;background:var(--accent);top:-80px;left:-60px}
.blob-2{width:250px;height:250px;background:var(--accent-light);bottom:10%;right:-50px;animation-delay:-7s}
@keyframes bd{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,-30px) scale(1.15)}}

/* ── Progress ── */
.progress-wrap{position:fixed;top:0;left:0;right:0;z-index:100;height:4px;background:var(--border);top:env(safe-area-inset-top,0)}
.progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),#ec4899,#f59e0b);background-size:200% 100%;animation:sh 3s ease-in-out infinite;transition:width .5s cubic-bezier(.4,0,.2,1);border-radius:0 3px 3px 0}
@keyframes sh{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}

/* ── App container ── */
.app{
  max-width:414px;margin:0 auto;
  padding:16px 16px 130px;
  padding-top:calc(env(safe-area-inset-top,0)+12px);
  min-height:100dvh;display:flex;flex-direction:column;
}

/* ── Screen ── */
.screen{display:none;flex-direction:column;gap:16px;flex:1}
.screen.active{display:flex}
.screen.anim{animation:fu .4s cubic-bezier(.2,.8,.3,1)}
@keyframes fu{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ── Question elements ── */
.q-icon{font-size:42px;text-align:center}
.anim .q-icon{animation:bi .5s cubic-bezier(.2,.8,.3,1.2)}
@keyframes bi{0%{transform:scale(0) rotate(-15deg);opacity:0}60%{transform:scale(1.2) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0)}}
.q-number{font-size:12px;color:var(--accent-light);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.q-text{font-size:20px;font-weight:700;line-height:1.35}
.q-hint{font-size:13px;color:var(--text-dim);line-height:1.5}

/* ── Inputs ── */
textarea{width:100%;min-height:90px;background:var(--input-bg);border:2px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:16px;font-family:inherit;padding:14px;resize:vertical;outline:none;transition:border-color .2s,box-shadow .2s}
textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
textarea::placeholder{color:var(--text-dim)}

/* ── Choice ── */
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{background:var(--input-bg);border:2px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;font-family:inherit;padding:14px 16px;min-height:48px;text-align:left;cursor:pointer;transition:all .2s;line-height:1.4}
.choice-btn:active{border-color:var(--accent);background:rgba(124,92,252,.12)}
.choice-btn.selected{border-color:var(--accent);background:rgba(124,92,252,.15);box-shadow:0 0 0 1px var(--accent)}

/* ── Chips ── */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--input-bg);border:2px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:inherit;padding:10px 14px;min-height:44px;display:flex;align-items:center;cursor:pointer;transition:all .25s;user-select:none;line-height:1.3}
.chip:active{border-color:var(--accent);background:rgba(124,92,252,.12);transform:scale(.97)}
.chip.selected{border-color:var(--accent);background:rgba(124,92,252,.18);box-shadow:0 0 0 1px var(--accent),0 4px 12px var(--accent-glow);transform:translateY(-2px)}

/* ── Nav ── */
.nav{position:fixed;bottom:8px;bottom:max(env(safe-area-inset-bottom,0),8px);left:0;right:0;padding:12px 16px 12px;background:linear-gradient(transparent,var(--bg) 25%);display:flex;gap:10px;justify-content:center;z-index:50}
.nav-btn{flex:1;max-width:200px;padding:16px 20px;border-radius:14px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;border:none;min-height:50px}
.btn-back{background:var(--card);color:var(--text-dim)}
.btn-back:active{background:var(--border)}
.btn-next{background:linear-gradient(135deg,var(--accent),#9333ea);color:#fff;box-shadow:0 4px 15px var(--accent-glow)}
.btn-next:active:not(:disabled){transform:scale(.97)}
.btn-next:disabled{opacity:.4;cursor:default}

/* ── Welcome / Finish ── */
.welcome-icon{font-size:60px;text-align:center;margin-top:20px;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}25%{transform:translateY(-8px)}75%{transform:translateY(4px)}}
.welcome-title{font-size:22px;font-weight:800;text-align:center;line-height:1.3;background:linear-gradient(135deg,var(--text),var(--accent-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;padding:0 8px}
.welcome-sub{font-size:14px;color:var(--text-dim);text-align:center;line-height:1.6}
.welcome-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.pill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;color:var(--text-dim);animation:fu .5s ease-out both}
.pill:nth-child(1){animation-delay:.1s}.pill:nth-child(2){animation-delay:.2s}.pill:nth-child(3){animation-delay:.3s}
.finish-icon{font-size:64px;text-align:center;margin-top:40px;animation:fp .6s cubic-bezier(.2,.8,.3,1.3)}
@keyframes fp{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.3) rotate(10deg);opacity:1}100%{transform:scale(1) rotate(0)}}
.finish-title{font-size:24px;font-weight:800;text-align:center;background:linear-gradient(135deg,var(--success),#60a5fa,var(--accent-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.finish-sub{font-size:14px;color:var(--text-dim);text-align:center;line-height:1.6}

/* ── Round intro ── */
.round-badge{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
.round-badge--semi{background:linear-gradient(135deg,#ec4899,#f59e0b)}
.round-badge--final{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.round-title{font-size:20px;font-weight:800;line-height:1.3;text-align:center}
.round-desc{font-size:14px;color:var(--text-dim);text-align:center;line-height:1.6}
.reveal-text{font-size:16px;color:var(--text);text-align:center;line-height:1.7;font-weight:500;min-height:60px}
.reveal-text .rw{display:inline;opacity:0;transition:opacity .25s ease}
.reveal-text .rw.visible{opacity:1}

/* ══ Iframe mockup ══ */
.mockup-variant{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:16px;margin-bottom:8px}
.mockup-variant.variant-a{background:linear-gradient(135deg,#7c5cfc,#9333ea)}
.mockup-variant.variant-b{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.mockup-variant-letter{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;flex-shrink:0}
.mockup-variant-text{flex:1}
.mockup-variant-title{font-size:16px;font-weight:700;color:#fff}
.mockup-variant-desc{font-size:12px;color:rgba(255,255,255,.7);margin-top:2px}

.iframe-wrap{
  width:100%;max-width:375px;
  height:min(calc(100dvh - 240px), 700px);
  margin:0 auto;
  border-radius:24px;
  border:3px solid #1d1d1f;
  overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,.35);
  position:relative;
  background:#fff;
}
.iframe-wrap iframe{
  width:100%;height:100%;border:none;
  display:block;
}
.iframe-loader{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:#f5f5f5;color:#7c7c87;font-size:14px;z-index:2;
  transition:opacity .3s;
}
.iframe-loader.hidden{opacity:0;pointer-events:none}
.mockup-instruction{text-align:center;font-size:14px;font-weight:600;color:var(--accent-light);margin-bottom:6px;padding:8px 14px;background:rgba(124,92,252,.1);border:1.5px solid rgba(124,92,252,.25);border-radius:12px}

/* ── Bracket tree ── */
.bracket-tree{display:flex;flex-direction:column;gap:0;width:100%;animation:fu .5s ease-out .3s both}
.bracket-stage{margin-bottom:2px}
.bracket-stage-label{font-size:10px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:6px 0 4px;text-align:center}
.bracket-half{display:flex;flex-direction:column;gap:0;margin-bottom:4px}
.bracket-pair{display:flex;gap:4px;padding:0 2px}
.bracket-slot{flex:1;display:flex;align-items:flex-start;gap:6px;padding:7px 10px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;font-size:12px;font-weight:500;line-height:1.25;transition:all .3s}
.bracket-slot--win{border-color:var(--accent);background:rgba(124,92,252,.12);color:var(--text)}
.bracket-slot--lose{opacity:.35;text-decoration:line-through;color:var(--text-dim)}
.bracket-slot--auto{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.08);color:var(--success)}
.bracket-slot--ghost{opacity:.15;border-style:dashed}
.bracket-slot-icon{font-size:13px;flex-shrink:0;width:18px;text-align:center}
.bracket-slot-name{flex:1;min-width:0;white-space:normal;overflow:visible;text-overflow:clip;overflow-wrap:anywhere;word-break:break-word}
.bracket-connector{display:flex;align-items:center;justify-content:center;height:20px;position:relative}
.bracket-connector::before{content:'';position:absolute;top:0;left:25%;right:25%;bottom:50%;border:1.5px solid var(--border);border-top:none;border-radius:0 0 8px 8px}
.bracket-connector::after{content:'';position:absolute;bottom:0;left:50%;width:2px;height:50%;background:var(--border);transform:translateX(-50%)}
.bracket-connector-single{display:flex;align-items:center;justify-content:center;height:16px;position:relative}
.bracket-connector-single::after{content:'';position:absolute;left:50%;width:2px;height:100%;background:var(--border);transform:translateX(-50%)}
.bracket-next{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px;padding:8px 12px;background:linear-gradient(135deg,rgba(124,92,252,.15),rgba(236,72,153,.1));border:1.5px solid rgba(124,92,252,.3);border-radius:12px;font-size:13px;font-weight:700;line-height:1.25;text-align:center;color:var(--accent-light)}
.bracket-next--final{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(239,68,68,.1));border-color:rgba(245,158,11,.3);color:#f59e0b}
.bracket-divider{height:10px}
.bracket-vs-label{font-size:11px;color:var(--text-dim);font-weight:600}
/* full tree for final */
.bracket-full{display:flex;gap:6px;align-items:stretch;width:100%;overflow-x:auto;padding:4px 0}
.bracket-col{display:flex;flex-direction:column;justify-content:space-around;gap:4px;flex:1;min-width:0}
.bracket-col-label{font-size:9px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;text-align:center;padding-bottom:4px;white-space:nowrap}
.bracket-cell{display:flex;align-items:center;gap:4px;padding:6px 8px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:10px;line-height:1.25;min-height:28px;white-space:normal;overflow:visible;overflow-wrap:anywhere;word-break:break-word}
.bracket-cell--win{border-color:var(--accent);background:rgba(124,92,252,.1)}
.bracket-cell--lose{opacity:.3;text-decoration:line-through}
.bracket-cell--auto{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.06)}
.bracket-cell--ghost{opacity:.18;border-style:dashed;color:var(--text-dim)}
.bracket-cell--stage{border-color:rgba(124,92,252,.42);background:rgba(124,92,252,.08);font-weight:700;justify-content:center;text-align:center}
.bracket-cell--empty{border-color:rgba(239,68,68,.32);background:rgba(239,68,68,.06);color:#fecaca;font-weight:700;justify-content:center;text-align:center}
.bracket-cell--next{border-color:#f59e0b;background:rgba(245,158,11,.1);font-weight:700;color:#f59e0b;justify-content:center}
.bracket-cell--champ{border-color:#f59e0b;background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(239,68,68,.08));font-weight:700;color:#f59e0b;justify-content:center;font-size:11px}
.bracket-lines{display:flex;flex-direction:column;justify-content:space-around;width:14px;flex-shrink:0;position:relative}
.bracket-line-pair{flex:1;display:flex;align-items:center;position:relative}
.bracket-line-pair::before{content:'';position:absolute;top:25%;bottom:25%;right:0;width:8px;border:1.5px solid var(--border);border-left:none;border-radius:0 6px 6px 0}
.bracket-line-out{flex:1;display:flex;align-items:center;position:relative}
.bracket-line-out::after{content:'';position:absolute;left:0;top:50%;width:100%;height:1.5px;background:var(--border)}

/* semi-final bracket */
.semi-bracket{display:flex;flex-direction:column;gap:12px;width:100%;padding-top:4px}
.semi-bracket__head{display:grid;grid-template-columns:minmax(0,1.55fr) 20px minmax(0,1fr);gap:8px;align-items:center;padding:0 4px}
.semi-bracket__head-col{font-size:9px;color:var(--text-dim);font-weight:700;letter-spacing:.5px;text-transform:uppercase;text-align:center}
.semi-bracket__row{display:grid;grid-template-columns:minmax(0,1.55fr) 20px minmax(0,1fr);gap:8px;align-items:center}
.semi-bracket__qf{display:flex;flex-direction:column;gap:8px;min-width:0}
.semi-bracket__pair{display:flex;flex-direction:column;gap:6px;min-width:0}
.semi-bracket__connector{position:relative;align-self:stretch;min-height:100%;min-width:20px}
.semi-bracket__connector::before{content:'';position:absolute;top:18%;bottom:18%;right:4px;width:10px;border:1.5px solid var(--border);border-left:none;border-radius:0 8px 8px 0}
.semi-bracket__connector::after{content:'';position:absolute;left:0;top:50%;width:10px;height:1.5px;background:var(--border);transform:translateY(-50%)}
.semi-bracket__match{display:flex;flex-direction:column;justify-content:center;gap:4px;min-height:72px;padding:10px 12px;border:1.5px solid rgba(124,92,252,.42);border-radius:12px;background:rgba(124,92,252,.08)}
.semi-bracket__match--auto{border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.08)}
.semi-bracket__match--empty{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.08)}
.semi-bracket__match-label{font-size:9px;color:var(--accent-light);font-weight:700;letter-spacing:.6px;text-transform:uppercase}
.semi-bracket__match--auto .semi-bracket__match-label{color:var(--success)}
.semi-bracket__match--empty .semi-bracket__match-label{color:#fca5a5}
.semi-bracket__match-text{font-size:12px;line-height:1.3;font-weight:700;color:var(--text);overflow-wrap:anywhere;word-break:break-word}
.semi-bracket__match--empty .semi-bracket__match-text{color:#fecaca}

/* unified overview for semi/final/finish */
.tourney-overview{display:flex;flex-direction:column;gap:12px;width:100%;padding-top:4px}
.tourney-overview__head{display:grid;align-items:center;gap:8px;padding:0 4px}
.tourney-overview__head--two{grid-template-columns:minmax(0,1.55fr) 20px minmax(0,1fr)}
.tourney-overview__head--three{grid-template-columns:minmax(0,1.55fr) 20px minmax(0,1.1fr) 20px minmax(0,1.1fr)}
.tourney-overview__head-col{font-size:9px;color:var(--text-dim);font-weight:700;letter-spacing:.5px;text-transform:uppercase;text-align:center}
.tourney-overview__body{display:grid;align-items:center;gap:8px}
.tourney-overview__body--two{grid-template-columns:minmax(0,1.55fr) 20px minmax(0,1fr)}
.tourney-overview__body--three{grid-template-columns:minmax(0,1.55fr) 20px minmax(0,1.1fr) 20px minmax(0,1.1fr)}
.tourney-overview__col{display:flex;flex-direction:column;gap:10px;min-width:0}
.tourney-overview__pair{display:flex;flex-direction:column;gap:6px;min-width:0}
.tourney-overview__lines{display:flex;flex-direction:column;justify-content:space-around;align-self:stretch;gap:10px;min-width:20px}
.tourney-overview__lines--single{justify-content:center}
.tourney-overview__line{flex:1;position:relative;min-height:58px}
.tourney-overview__line::before{content:'';position:absolute;top:18%;bottom:18%;right:4px;width:10px;border:1.5px solid var(--border);border-left:none;border-radius:0 8px 8px 0}
.tourney-overview__line::after{content:'';position:absolute;left:0;top:50%;width:10px;height:1.5px;background:var(--border);transform:translateY(-50%)}
.tourney-overview__final{display:flex;align-items:center;justify-content:center;min-width:0}
.tourney-overview__final .bracket-cell{width:100%;min-height:56px}

/* ── Sending overlay ── */
.sending-overlay{display:none;position:fixed;inset:0;background:rgba(15,15,26,.85);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.sending-overlay.visible{display:flex}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Confetti ── */
#confetti{position:fixed;inset:0;z-index:100;pointer-events:none}

/* ── Halfway ── */
.halfway-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:linear-gradient(135deg,#7c5cfc,#ec4899);color:#fff;font-size:14px;font-weight:700;padding:10px 20px;border-radius:30px;z-index:150;pointer-events:none;white-space:nowrap;box-shadow:0 8px 30px rgba(124,92,252,.4)}
.halfway-toast.show{animation:ts 2.5s cubic-bezier(.2,.8,.3,1) forwards}
@keyframes ts{0%{transform:translateX(-50%) translateY(-100px);opacity:0}15%{transform:translateX(-50%) translateY(0);opacity:1}80%{transform:translateX(-50%) translateY(0);opacity:1}100%{transform:translateX(-50%) translateY(-100px);opacity:0}}

/* ── Mobile ── */
@media (max-width:430px) {
  .app{padding:10px 14px 120px;padding-top:calc(env(safe-area-inset-top,0)+8px)}
  .screen{gap:12px}
  .q-icon{font-size:36px}
  .q-text{font-size:18px}
  .q-hint{font-size:12px}
  .welcome-icon{font-size:50px;margin-top:10px}
  .welcome-title{font-size:20px}
  .welcome-sub{font-size:13px}
  .finish-icon{font-size:52px;margin-top:24px}
  .finish-title{font-size:22px}
  .round-title{font-size:18px}
  .reveal-text{font-size:15px;min-height:50px}
  .iframe-wrap{max-width:100%;border-radius:18px;border-width:2px;height:min(calc(100dvh - 220px),700px)}
  .mockup-variant{padding:10px 14px;gap:10px;margin-bottom:4px;border-radius:12px}
  .mockup-variant-letter{width:34px;height:34px;font-size:17px;border-radius:10px}
  .mockup-variant-title{font-size:14px}
  .mockup-variant-desc{font-size:11px}
  .mockup-instruction{font-size:13px;margin-bottom:4px;padding:7px 12px}
  .nav{bottom:10px;bottom:max(env(safe-area-inset-bottom,0),10px);padding:10px 14px 10px}
  .nav-btn{padding:14px 16px;font-size:15px;border-radius:12px;min-height:46px}
  textarea{min-height:80px;font-size:16px;padding:12px}
  .choice-btn{padding:12px 14px;font-size:14px}
  .chip{padding:10px 12px;font-size:13px}
  .semi-bracket{gap:10px}
  .semi-bracket__head,.semi-bracket__row{grid-template-columns:minmax(0,1.45fr) 16px minmax(0,1fr);gap:6px}
  .semi-bracket__connector{min-width:16px}
  .semi-bracket__connector::before{right:2px;width:10px}
  .semi-bracket__match{min-height:64px;padding:9px 10px}
  .semi-bracket__match-text{font-size:11px}
  .tourney-overview{gap:10px}

<body>

<div class="bg-layer"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
<div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

  <button class="nav-btn btn-next" id="btnNext" onclick="goNext()">Дальше</button>
</div>

<div class="halfway-toast" id="halfwayToast">&#128170; Половина позади!</div>
<canvas id="confetti"></canvas>
<div class="sending-overlay" id="sendingOverlay"><div class="spinner"></div><div style="color:var(--text-dim);font-size:15px">Отправляем...</div></div>

<script>
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw5tPpjujdJfAb1ZXGaFgUTvXL0Ge9IG-GlY_9Vk4NhZDf6XFJZ0N1B7xh6sBBmh3Rr/exec';
const APP_BASE = '/neuroom-homework-density-prototypes/';

// ══════════════════════════════════════
// VARIANTS
// ══════════════════════════════════════
const V = {
  filter:    { key:'filter',    label:'Простой список',        desc:'Все задания подряд с фильтром по предмету',              path:'' },
  priority:  { key:'priority',  label:'Список по приоритету',  desc:'Задания разбиты по важности: сначала горящие',           path:'priority' },
  timeline:  { key:'timeline',  label:'Таймлайн',              desc:'Вертикальная линия времени по дням',                     path:'timeline' },
  calendar:  { key:'calendar',  label:'Календарь на неделю',   desc:'Дни недели с заданиями в каждом',                        path:'calendar' },
  kanban:    { key:'kanban',    label:'Канбан-доска',           desc:'Столбцы по статусу: активные, на проверке, сдано',       path:'kanban' },
  matrix:    { key:'matrix',    label:'Таблица',                desc:'Строки = дни, столбцы = предметы, ячейки = задания',     path:'matrix' },
  quickwins: { key:'quickwins', label:'Quick Wins',             desc:'Автоматическая очередь: сначала лёгкое и срочное',       path:'quick-wins' },
};

// ══════════════════════════════════════
// TOURNAMENT HELPERS
// ══════════════════════════════════════
// QF: 0=A, 1=B, 2=both advance, 3=both eliminated
function getAdvancers(qId, varA, varB) {
  const a = answers[qId];
  if (!a || a.choiceIndex === undefined) return [varA];
  switch (a.choiceIndex) {
    case 0: return [varA];
    case 1: return [varB];
    case 2: return [varA, varB];
    case 3: return [];
    default: return [varA];
  }
}
function getMatchWinner(qId, a, b) {
  const ans = answers[qId];
  if (!ans || ans.choiceIndex === undefined) return a;
  return ans.choiceIndex === 1 ? b : a;
}

// Build sequential 1v1 elimination for a pool
function buildPoolElim(pool, prefix) {
  if (pool.length <= 1) return { screens: [], winner: pool[0] || null };
  const screens = [];
  let rem = [...pool], mn = 1;
  while (rem.length > 1) {
    const a = rem[0], b = rem[1], qId = `${prefix}_m${mn}_q1`;
    screens.push(
      { id:`${prefix}_m${mn}_a`, type:'mockup', variant:'a', variantTitle:a.label, variantDesc:a.desc, instruction: mn===1?'Посмотри этот вариант':'Победитель — посмотри снова', path:a.path },
      { id:`${prefix}_m${mn}_b`, type:'mockup', variant:'b', variantTitle:b.label, variantDesc:b.desc, instruction:'Сравни', path:b.path },
      { id:qId, type:'choice', icon:'&#9876;&#65039;', number:0, total:0, text:'Кто проходит дальше?', choices:['А — '+a.label,'Б — '+b.label], required:true }
    );
    rem = [getMatchWinner(qId, a, b), ...rem.slice(2)];
    mn++;
  }
  return { screens, winner: rem[0] };
}

// ══════════════════════════════════════
// BRACKET BUILDERS
// ══════════════════════════════════════
function buildPoolTrace(pool, prefix) {
  if (pool.length <= 1) return { pool, matches: [], lastMatch: null, winner: pool[0] || null };
  const matches = [];
  let rem = [...pool], mn = 1;
  while (rem.length > 1) {
    const a = rem[0], b = rem[1], qId = `${prefix}_m${mn}_q1`;
    const winner = getMatchWinner(qId, a, b);
    const loser = winner === a ? b : a;
    matches.push({ a, b, winner, loser, qId });
    rem = [winner, ...rem.slice(2)];
    mn++;
  }
  return { pool, matches, lastMatch: matches[matches.length - 1] || null, winner: rem[0] || null };
}

function bracketCellHtml(label, cls) {
  return `<div class="bracket-cell bracket-cell--${cls}">${label}</div>`;
}

function bracketPairHtml(items) {
  return `<div class="tourney-overview__pair">${items.map((item) => bracketCellHtml(item.label, item.cls)).join('')}</div>`;
}

function qfPairItems(qId, varA, varB) {
  const ci = answers[qId] ? answers[qId].choiceIndex : undefined;
  if (ci === 2) return [{ label: varA.label, cls: 'win' }, { label: varB.label, cls: 'win' }];
  if (ci === 3) return [{ label: varA.label, cls: 'lose' }, { label: varB.label, cls: 'lose' }];
  const winner = ci === 1 ? varB : varA;
  const loser = ci === 1 ? varA : varB;
  return [{ label: winner.label, cls: 'win' }, { label: loser.label, cls: 'lose' }];
}

function autoPairItems(v) {
  return [{ label: v.label, cls: 'auto' }, { label: 'авто', cls: 'ghost' }];
}

function tracePairItems(trace) {
  if (!trace.winner) return [{ label: 'Нет финалиста', cls: 'empty' }];
  if (!trace.lastMatch) return [{ label: trace.winner.label, cls: 'auto' }, { label: 'без боя', cls: 'ghost' }];
  return [
    { label: trace.lastMatch.winner.label, cls: 'win' },
    { label: trace.lastMatch.loser.label, cls: 'lose' },
  ];
}

function stageCardHtml(pool) {
  if (pool.length === 0) return bracketCellHtml('Нет участников', 'empty');
  if (pool.length === 1) return bracketCellHtml(`${pool[0].label} — без боя`, 'auto');
  if (pool.length === 2) return bracketCellHtml(`${pool[0].label} vs ${pool[1].label}`, 'stage');
  return bracketCellHtml(pool.map((v) => v.label).join(' • '), 'stage');
}

function finalCardHtml(finalists, champion) {
  if (champion) return bracketCellHtml(champion.label, 'champ');
  if (finalists.length === 0) return bracketCellHtml('Нет финалистов', 'empty');
  if (finalists.length === 1) return bracketCellHtml(`${finalists[0].label} — без боя`, 'auto');
  return bracketCellHtml(`${finalists[0].label} vs ${finalists[1].label}`, 'next');
}

function buildSemiBracketHtml() {
  const pool1 = [...getAdvancers('r1_q1',V.filter,V.kanban), ...getAdvancers('r2_q1',V.priority,V.calendar)];
  const pool2 = [...getAdvancers('r3_q1',V.timeline,V.matrix), V.quickwins];
  return `
  <div class="bracket-tree">
    <div class="bracket-stage-label">&#127942; Турнирная сетка</div>
    <div class="tourney-overview">
      <div class="tourney-overview__head tourney-overview__head--two">
        <div class="tourney-overview__head-col">ЧФ</div>
        <div></div>
        <div class="tourney-overview__head-col">ПФ</div>
      </div>
      <div class="tourney-overview__body tourney-overview__body--two">
        <div class="tourney-overview__col">
          ${bracketPairHtml(qfPairItems('r1_q1',V.filter,V.kanban))}
          ${bracketPairHtml(qfPairItems('r2_q1',V.priority,V.calendar))}
          ${bracketPairHtml(qfPairItems('r3_q1',V.timeline,V.matrix))}
          ${bracketPairHtml(autoPairItems(V.quickwins))}
        </div>
        <div class="tourney-overview__lines">
          <div class="tourney-overview__line"></div>
          <div class="tourney-overview__line"></div>
        </div>
        <div class="tourney-overview__col">
          <div class="tourney-overview__final">${stageCardHtml(pool1)}</div>
          <div class="tourney-overview__final">${stageCardHtml(pool2)}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function buildFinalBracketHtml() {
  const pool1 = [...getAdvancers('r1_q1',V.filter,V.kanban), ...getAdvancers('r2_q1',V.priority,V.calendar)];
  const pool2 = [...getAdvancers('r3_q1',V.timeline,V.matrix), V.quickwins];
  const sf1 = buildPoolTrace(pool1, 's1');
  const sf2 = buildPoolTrace(pool2, 's2');
  const finalists = [sf1.winner, sf2.winner].filter(Boolean);
  return `
  <div class="bracket-tree">
    <div class="bracket-stage-label">&#127942; Турнирная сетка</div>
    <div class="tourney-overview">
      <div class="tourney-overview__head tourney-overview__head--three">
        <div class="tourney-overview__head-col">ЧФ</div>
        <div></div>
        <div class="tourney-overview__head-col">ПФ</div>
        <div></div>
        <div class="tourney-overview__head-col">&#127942;</div>
      </div>
      <div class="tourney-overview__body tourney-overview__body--three">
        <div class="tourney-overview__col">
          ${bracketPairHtml(qfPairItems('r1_q1',V.filter,V.kanban))}
          ${bracketPairHtml(qfPairItems('r2_q1',V.priority,V.calendar))}
          ${bracketPairHtml(qfPairItems('r3_q1',V.timeline,V.matrix))}
          ${bracketPairHtml(autoPairItems(V.quickwins))}
        </div>
        <div class="tourney-overview__lines">
          <div class="tourney-overview__line"></div>
          <div class="tourney-overview__line"></div>
        </div>
        <div class="tourney-overview__col">
          ${bracketPairHtml(tracePairItems(sf1))}
          ${bracketPairHtml(tracePairItems(sf2))}
        </div>
        <div class="tourney-overview__lines tourney-overview__lines--single">
          <div class="tourney-overview__line"></div>
        </div>
        <div class="tourney-overview__final">
          ${finalCardHtml(finalists, null)}
        </div>
      </div>
    </div>
  </div>`;
}

function buildFullTreeHtml(champion) {
  const pool1 = [...getAdvancers('r1_q1',V.filter,V.kanban), ...getAdvancers('r2_q1',V.priority,V.calendar)];
  const pool2 = [...getAdvancers('r3_q1',V.timeline,V.matrix), V.quickwins];
  const sf1 = buildPoolTrace(pool1,'s1');
  const sf2 = buildPoolTrace(pool2,'s2');
  const finalists = [sf1.winner, sf2.winner].filter(Boolean);
  return `
  <div class="bracket-tree">
    <div class="bracket-stage-label">&#127942; Турнирная сетка</div>
    <div class="tourney-overview">
      <div class="tourney-overview__head tourney-overview__head--three">
        <div class="tourney-overview__head-col">ЧФ</div>
        <div></div>
        <div class="tourney-overview__head-col">ПФ</div>
        <div></div>
        <div class="tourney-overview__head-col">&#127942;</div>
      </div>
      <div class="tourney-overview__body tourney-overview__body--three">
        <div class="tourney-overview__col">
          ${bracketPairHtml(qfPairItems('r1_q1',V.filter,V.kanban))}
          ${bracketPairHtml(qfPairItems('r2_q1',V.priority,V.calendar))}
          ${bracketPairHtml(qfPairItems('r3_q1',V.timeline,V.matrix))}
          ${bracketPairHtml(autoPairItems(V.quickwins))}
        </div>
        <div class="tourney-overview__lines">
          <div class="tourney-overview__line"></div>
          <div class="tourney-overview__line"></div>
        </div>
        <div class="tourney-overview__col">
          ${bracketPairHtml(tracePairItems(sf1))}
          ${bracketPairHtml(tracePairItems(sf2))}
        </div>
        <div class="tourney-overview__lines tourney-overview__lines--single">
          <div class="tourney-overview__line"></div>
        </div>
        <div class="tourney-overview__final">
          ${finalCardHtml(finalists, champion)}
        </div>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════
// IFRAME BUILDER
// ══════════════════════════════════════
function iframeMockup(path, iframeId) {
  const src = APP_BASE + path + (path.includes('?') ? '&' : '?') + 'embed=1';
  return `
  <div class="iframe-wrap">
    <div class="iframe-loader" id="loader-${iframeId}">Загрузка экрана...</div>
    <iframe id="${iframeId}" src="${src}" loading="lazy" onload="document.getElementById('loader-${iframeId}').classList.add('hidden');enableIframeUnlock()"></iframe>
  </div>`;
}

function revealWords(el, text, onDone) {
  const words = text.split(' ');
  el.innerHTML = words.map(w => `<span class="rw">${w} </span>`).join('');
  const spans = el.querySelectorAll('.rw');
  let i = 0;
  function next() {
    if (i >= spans.length) { if (onDone) onDone(); return; }
    spans[i].classList.add('visible');
    i++;
    setTimeout(next, 120);
  }
  setTimeout(next, 300);
}

function enableIframeUnlock() {
  setTimeout(() => { document.getElementById('btnNext').disabled = false; }, 2500);
}

// ══════════════════════════════════════
// BUILD SCREENS (dynamic tournament)
// ══════════════════════════════════════
function buildScreens() {
  // Pools from QFs
  const pool1 = [...getAdvancers('r1_q1', V.filter, V.kanban), ...getAdvancers('r2_q1', V.priority, V.calendar)];
  const pool2 = [...getAdvancers('r3_q1', V.timeline, V.matrix), V.quickwins];

  // SF elimination
  const sf1 = buildPoolElim(pool1, 's1');
  const sf2 = buildPoolElim(pool2, 's2');

  // Final
  const finalists = [sf1.winner, sf2.winner].filter(Boolean);
  const fin = buildPoolElim(finalists, 'final');

  // Semi intro description adapts to pool sizes
  let semiDesc = 'Победители четвертьфиналов встречаются. Посмотри экраны заново и выбери.';
  if (pool1.length > 2 || pool2.length > 2) semiDesc = 'Некоторые варианты прошли оба — будут дополнительные матчи!';
  if (pool1.length === 0 || pool2.length <= 1) semiDesc = 'Кто-то выбыл, кто-то прошёл без боя. Посмотри, что получилось.';

  // Auto-advance / no contenders screens for SF
  const sf1Extra = [];
  if (pool1.length === 0) sf1Extra.push({ id:'s1_empty', type:'round_intro', round:'Полуфинал 1', title:'Нет участников', desc:'Оба варианта выбыли в четвертьфиналах. Другая сторона сетки проходит в финал без боя.' });
  else if (pool1.length === 1) sf1Extra.push({ id:'s1_auto', type:'round_intro', round:'Полуфинал 1', title:pool1[0].label+' — без боя!', desc:'Единственный выживший проходит в финал автоматически.' });

  const sf2Extra = [];
  if (pool2.length <= 1) {} // Quick Wins always in pool2, so pool2 >= 1

  // Final intro
  let finalDesc = 'Два лучших экрана. Какой станет чемпионом?';
  if (finalists.length === 1) finalDesc = finalists[0].label + ' побеждает без финального боя! Соперников не осталось.';
  else if (finalists.length === 0) finalDesc = 'Все варианты выбыли... Чемпиона нет!';

  const all = [
    // Welcome
    { id:'welcome', type:'welcome' },

    // ── QF 1 ──
    { id:'r1_intro', type:'round_intro', round:'Четвертьфинал 1', title:'Список vs Доска', desc:'Простой список или канбан-доска. Посмотри оба и выбери.' },
    { id:'r1_a', type:'mockup', variant:'a', variantTitle:V.filter.label, variantDesc:V.filter.desc, instruction:'Прокрути экран и посмотри', path:V.filter.path },
    { id:'r1_b', type:'mockup', variant:'b', variantTitle:V.kanban.label, variantDesc:V.kanban.desc, instruction:'Листай колонки и сравни', path:V.kanban.path },
    { id:'r1_q1', type:'choice', icon:'&#129504;', number:0, total:0, text:'Где удобнее смотреть задания?', choices:['А — '+V.filter.label,'Б — '+V.kanban.label,'Оба нормально','Оба не понравились'], required:true },

    // ── QF 2 ──
    { id:'r2_intro', type:'round_intro', round:'Четвертьфинал 2', title:'Приоритеты vs Календарь', desc:'По важности или по дням недели. Посмотри оба и выбери.' },
    { id:'r2_a', type:'mockup', variant:'a', variantTitle:V.priority.label, variantDesc:V.priority.desc, instruction:'Прокрути экран и посмотри', path:V.priority.path },
    { id:'r2_b', type:'mockup', variant:'b', variantTitle:V.calendar.label, variantDesc:V.calendar.desc, instruction:'Прокрути и сравни', path:V.calendar.path },
    { id:'r2_q1', type:'choice', icon:'&#128197;', number:0, total:0, text:'Где проще найти нужное задание?', choices:['А — '+V.priority.label,'Б — '+V.calendar.label,'Одинаково','Оба неудобные'], required:true },

    // ── QF 3 ──
    { id:'r3_intro', type:'round_intro', round:'Четвертьфинал 3', title:'Таймлайн vs Таблица', desc:'Линия времени или таблица «дни × предметы». Посмотри и выбери.' },
    { id:'r3_a', type:'mockup', variant:'a', variantTitle:V.timeline.label, variantDesc:V.timeline.desc, instruction:'Прокрути экран и посмотри', path:V.timeline.path },
    { id:'r3_b', type:'mockup', variant:'b', variantTitle:V.matrix.label, variantDesc:V.matrix.desc, instruction:'Посмотри на таблицу', path:V.matrix.path },
    { id:'r3_q1', type:'choice', icon:'&#128202;', number:0, total:0, text:'Что помогает лучше понять, что делать?', choices:['А — '+V.timeline.label,'Б — '+V.matrix.label,'Одинаково','Оба запутывают'], required:true },

    // ── QF 4: Quick Wins (bye) ──
    { id:'r4_intro', type:'round_intro', round:'Четвертьфинал 4', title:'Умная очередь', desc:'Quick Wins расставляет задания по порядку — от простых и срочных к сложным. Автоматически проходит в полуфинал.' },
    { id:'r4_qw', type:'mockup', variant:'a', variantTitle:V.quickwins.label, variantDesc:V.quickwins.desc, instruction:'Прокрути — задания расставлены по порядку', path:V.quickwins.path },
    { id:'qw_q1', type:'choice', icon:'&#9889;', number:0, total:0, text:'Полезно, когда приложение подсказывает, с чего начать?', choices:['Да, очень — не надо думать','Немного помогает','Всё равно','Нет, сам(а) разберусь'], required:true },

    // ── Semi-finals ──
    { id:'semi_intro', type:'round_intro', badgeClass:'round-badge--semi', round:'Полуфинал', title:'Лучшие против лучших', desc:semiDesc, bracketBuilder:'semi' },
    ...sf1Extra,
    ...sf1.screens,
    ...sf2Extra,
    ...sf2.screens,

    // ── Final ──
    { id:'final_intro', type:'round_intro', badgeClass:'round-badge--final', round:'Финал', title:'Главный выбор', desc:finalDesc, bracketBuilder: finalists.length >= 2 ? 'final' : null },
    ...fin.screens,
    ...(fin.winner ? [{ id:'final_q2', type:'textarea', icon:'&#128172;', number:0, total:0, text:'Почему именно этот?', placeholder:'Мне больше всего нравится, потому что...', required:false }] : []),

    // ── Overall ──
    { id:'imp_q1', type:'multiselect', icon:'&#127775;', number:0, total:0, text:'Что для тебя самое важное на экране с домашкой?', hint:'Можно выбрать несколько.', options:[{label:'Быстро найти нужное задание'},{label:'Видеть сроки и дедлайны'},{label:'Понимать статус (сдано / не сдано)'},{label:'Не запутаться, когда много заданий'},{label:'Видеть все предметы сразу'},{label:'Знать с чего начать'},{label:'Красивый и понятный вид'}], required:true, minSelect:1 },
    { id:'miss_q1', type:'multiselect', icon:'&#128161;', number:0, total:0, text:'Чего не хватает на этих экранах?', hint:'Выбери всё важное.', options:[{label:'Напоминания о дедлайнах'},{label:'Оценка сложности задания'},{label:'Сколько времени займёт'},{label:'Комментарии от учителя'},{label:'Группировка по предмету'},{label:'Поиск по заданиям'},{label:'Прогресс за неделю'},{label:'Всего хватает',exclusive:true}], required:true, minSelect:1 },

    // Finish
    { id:'finish', type:'finish' },
  ];

  // Number questions dynamically
  let qIdx = 0;
  const totalQ = all.filter(s=>['choice','textarea','multiselect'].includes(s.type)).length;
  all.forEach(s => { if (['choice','textarea','multiselect'].includes(s.type)) { qIdx++; s.number = qIdx; s.total = totalQ; } });

  return all;
}

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let current = 0;
const answers = {};
let shouldAnimate = true;
let halfwayShown = false;
// Unique respondent ID (persisted in sessionStorage for this session)
const respondentId = sessionStorage.getItem('neuroom_rid') || (Date.now().toString(36) + Math.random().toString(36).slice(2,6));
sessionStorage.setItem('neuroom_rid', respondentId);

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function render() {
  const screens = buildScreens();
  const app = document.getElementById('app');
  const s = screens[current];
  const nav = document.getElementById('nav');

  const pct = s.type === 'finish' ? 100 : s.type === 'welcome' ? 0 : (current / (screens.length-1) * 100);
  document.getElementById('progressBar').style.width = pct + '%';

  if (current === Math.floor(screens.length/2) && !halfwayShown) {
    halfwayShown = true;
    const t = document.getElementById('halfwayToast'); t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  }

  const ac = shouldAnimate ? ' anim' : '';
  shouldAnimate = false;
  let html = `<div class="screen active${ac}">`;

  if (s.type === 'welcome') {
    html += `
      <div class="welcome-icon">&#127942;</div>
      <div class="welcome-title">Чемпионат экранов: найди лучший способ смотреть задания</div>
      <div class="welcome-sub">
        7 вариантов экрана «Задания» соревнуются между собой.<br><br>
        <strong style="color:var(--accent-light)">Четвертьфиналы</strong> — сравни пары<br>
        <strong style="color:#ec4899">Полуфиналы</strong> — победители встречаются<br>
        <strong style="color:#f59e0b">Финал</strong> — выбери чемпиона<br><br>
        Правильных ответов нет — нам важно твоё мнение.
      </div>
      <div class="welcome-pills">
        <div class="pill">&#9201; 5-7 минут</div>
        <div class="pill">3 этапа + вопросы</div>
        <div class="pill">&#128274; анонимно</div>
      </div>`;
    nav.style.display = 'flex';
    document.getElementById('btnBack').style.display = 'none';
    document.getElementById('btnNext').textContent = 'Начать';
    document.getElementById('btnNext').disabled = false;
    html += '</div>';
    app.innerHTML = html;
    return;
  }

  if (s.type === 'finish') {
    const screens = buildScreens();
    const pool1 = [...getAdvancers('r1_q1',V.filter,V.kanban),...getAdvancers('r2_q1',V.priority,V.calendar)];
    const pool2 = [...getAdvancers('r3_q1',V.timeline,V.matrix),V.quickwins];
    const sf1 = buildPoolElim(pool1,'s1'), sf2 = buildPoolElim(pool2,'s2');
    const finalists = [sf1.winner,sf2.winner].filter(Boolean);
    const fin = buildPoolElim(finalists,'final');
    const champion = fin.winner;
    const champName = champion ? champion.label : 'Нет чемпиона';
    const shareText = encodeURIComponent('Я прошёл чемпионат экранов Neuroom! Мой чемпион: ' + champName + ' 🏆');
    const shareUrl = encodeURIComponent(location.href.split('?')[0]);

    html += `
      <div class="finish-icon">&#127942;</div>
      <div class="finish-title">${champion ? 'Чемпион: '+champion.label+'!' : 'Чемпионат завершён!'}</div>
      <div class="finish-sub">Спасибо! Твои ответы помогут сделать экран заданий удобнее.</div>
      <div id="finishTree" style="margin-top:8px"></div>
      <div style="font-size:13px;color:var(--text-dim);text-align:center;margin-top:12px">Поделись результатом с друзьями:</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:6px">
        <button onclick="shareResult('tg')" style="display:flex;align-items:center;gap:6px;padding:12px 18px;border-radius:12px;border:none;background:#2AABEE;color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer">&#9992;&#65039; Telegram</button>
        <button onclick="shareResult('vk')" style="display:flex;align-items:center;gap:6px;padding:12px 18px;border-radius:12px;border:none;background:#4680C2;color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer">&#127760; VK</button>
      </div>`;
    nav.style.display = 'none';
    html += '</div>';
    app.innerHTML = html;
    document.getElementById('finishTree').innerHTML = buildFullTreeHtml(champion);
    launchConfetti();
    return;
  }

  if (s.type === 'round_intro') {
    const badgeCls = s.badgeClass ? ' ' + s.badgeClass : '';
    const hasBracket = !!s.bracketBuilder;
    html += `
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center">
        <div class="round-badge${badgeCls}">${s.round}</div>
        <div class="round-title">${s.title}</div>
        <div class="reveal-text" id="revealTarget"></div>
        ${hasBracket ? '<div id="bracketSlot" style="width:100%;opacity:0;transition:opacity .5s"></div>' : ''}
      </div>`;
    nav.style.display = 'flex';
    document.getElementById('btnBack').style.display = current > 1 ? '' : 'none';
    document.getElementById('btnNext').textContent = 'Дальше';
    document.getElementById('btnNext').disabled = true;
    html += '</div>';
    app.innerHTML = html;
    revealWords(document.getElementById('revealTarget'), s.desc, () => {
      if (hasBracket) {
        const bracketSlot = document.getElementById('bracketSlot');
        bracketSlot.innerHTML = s.bracketBuilder === 'final' ? buildFinalBracketHtml() : buildSemiBracketHtml();
        requestAnimationFrame(() => { bracketSlot.style.opacity = '1'; });
        setTimeout(() => { document.getElementById('btnNext').disabled = false; }, 1500);
      } else {
        document.getElementById('btnNext').disabled = false;
      }
    });
    return;
  }

  if (s.type === 'mockup') {
    const isA = s.variant === 'a';
    const letter = isA ? 'А' : 'Б';
    const cls = isA ? 'variant-a' : 'variant-b';
    html += `<div class="mockup-variant ${cls}">
      <div class="mockup-variant-letter">${letter}</div>
      <div class="mockup-variant-text">
        <div class="mockup-variant-title">${s.variantTitle}</div>
        <div class="mockup-variant-desc">${s.variantDesc}</div>
      </div>
    </div>`;
    html += `<div class="mockup-instruction">&#11015; ${s.instruction}</div>`;
    const iframeId = 'iframe-' + s.id;
    html += iframeMockup(s.path, iframeId);

    nav.style.display = 'flex';
    document.getElementById('btnBack').style.display = current > 1 ? '' : 'none';
    document.getElementById('btnNext').textContent = 'Дальше';
    document.getElementById('btnNext').disabled = true;
    html += '</div>';
    app.innerHTML = html;
    return;
  }

  // ── Regular question ──
  nav.style.display = 'flex';
  document.getElementById('btnBack').style.display = current > 1 ? '' : 'none';
  document.getElementById('btnNext').textContent = current === screens.length - 2 ? 'Отправить' : 'Дальше';

  if (s.icon) html += `<div class="q-icon">${s.icon}</div>`;
  if (s.number) html += `<div class="q-number">Вопрос ${s.number} из ${s.total}</div>`;
  html += `<div class="q-text">${s.text}</div>`;
  if (s.hint) html += `<div class="q-hint">${s.hint}</div>`;

  const saved = answers[s.id] || {};

  if (s.type === 'textarea') {
    html += `<textarea id="input-${s.id}" placeholder="${s.placeholder||''}" oninput="onInput('${s.id}')">${saved.value||''}</textarea>`;
  }
  if (s.type === 'choice') {
    html += '<div class="choices">';
    s.choices.forEach((c,i) => {
      html += `<button class="choice-btn ${saved.choiceIndex===i?'selected':''}" onclick="onChoice('${s.id}',${i})">${c}</button>`;
    });
    html += '</div>';
  }
  if (s.type === 'multiselect') {
    const sel = saved.selected || [];
    html += '<div class="chips">';
    s.options.forEach((o,i) => {
      html += `<button class="chip ${sel.includes(i)?'selected':''}" onclick="onMulti('${s.id}',${i})">${o.label}</button>`;
    });
    html += '</div>';
  }

  html += '</div>';
  app.innerHTML = html;
  updateNextBtn();
}

// ══════════════════════════════════════
// HANDLERS
// ══════════════════════════════════════
function onInput(id) {
  if (!answers[id]) answers[id] = {};
  answers[id].value = document.getElementById('input-'+id).value;
  updateNextBtn();
}
function onChoice(id, i) {
  const screens = buildScreens();
  const s = screens.find(s=>s.id===id);
  if (!answers[id]) answers[id] = {};
  answers[id].choiceIndex = i;
  answers[id].value = s.choices[i];
  render();
}
function onMulti(id, i) {
  const screens = buildScreens();
  const s = screens.find(s=>s.id===id);
  if (!answers[id]) answers[id] = {selected:[]};
  if (!answers[id].selected) answers[id].selected = [];
  const opt = s.options[i];
  const maxSel = s.maxSelect || Infinity;
  if (opt.exclusive) {
    answers[id].selected = answers[id].selected.includes(i) ? [] : [i];
  } else {
    const excl = s.options.map((o,j)=>o.exclusive?j:-1).filter(j=>j>=0);
    answers[id].selected = answers[id].selected.filter(j=>!excl.includes(j));
    const p = answers[id].selected.indexOf(i);
    if (p >= 0) {
      answers[id].selected.splice(p,1);
    } else {
      if (answers[id].selected.length < maxSel) {
        answers[id].selected.push(i);
      }
    }
  }
  answers[id].value = answers[id].selected.map(j=>s.options[j].label).join(', ');
  render();
}

function isAnswered(s) {
  if (['welcome','finish','round_intro','mockup'].includes(s.type)) return true;
  const a = answers[s.id];
  if (!s.required) return true;
  if (!a) return false;
  if (s.type==='textarea') return (a.value||'').trim().length > 0;
  if (s.type==='choice') return a.choiceIndex !== undefined;
  if (s.type==='multiselect') return (a.selected||[]).length >= (s.minSelect||1);
  return true;
}
function updateNextBtn() {
  const screens = buildScreens();
  document.getElementById('btnNext').disabled = !isAnswered(screens[current]);
}

function goNext() {
  const screens = buildScreens();
  const s = screens[current];
  if (!isAnswered(s)) return;
  if (current === screens.length - 2) { submitAnswers(); return; }
  current++;
  shouldAnimate = true;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function goBack() {
  if (current > 1) {
    current--;
    shouldAnimate = true;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  }
}

// ══════════════════════════════════════
// SUBMIT
// ══════════════════════════════════════
async function submitAnswers() {
  const ov = document.getElementById('sendingOverlay'); ov.classList.add('visible');
  const screens = buildScreens();
  const ref = sessionStorage.getItem('neuroom_ref') || '';
  const data = { timestamp: new Date().toISOString(), respondent_id: respondentId, referred_by: ref };
  screens.forEach(s => {
    if (['welcome','finish','round_intro','mockup'].includes(s.type)) return;
    const a = answers[s.id] || {};
    data[s.id] = a.value || '';
  });
  if (GOOGLE_SCRIPT_URL) {
    try { await fetch(GOOGLE_SCRIPT_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) }); } catch(e) { saveLocal(data); }
  } else { saveLocal(data); }
  ov.classList.remove('visible');
  current = screens.length - 1;
  shouldAnimate = true;
  render();
}
function saveLocal(data) {
  const k = 'neuroom_hwdensity_survey';
  const e = JSON.parse(localStorage.getItem(k)||'[]');
  e.push(data);
  localStorage.setItem(k, JSON.stringify(e));
}

// ══════════════════════════════════════
// SHARE & TELEGRAM SIGNUP
// ══════════════════════════════════════
function shareResult(platform) {
  const pool1 = [...getAdvancers('r1_q1',V.filter,V.kanban),...getAdvancers('r2_q1',V.priority,V.calendar)];
  const pool2 = [...getAdvancers('r3_q1',V.timeline,V.matrix),V.quickwins];
  const sf1 = buildPoolElim(pool1,'s1'), sf2 = buildPoolElim(pool2,'s2');
  const fin = buildPoolElim([sf1.winner,sf2.winner].filter(Boolean),'final');
  const champName = fin.winner ? fin.winner.label : '???';
  const text = 'Я прошёл чемпионат экранов Neuroom! Мой чемпион: ' + champName + ' \uD83C\uDFC6';
  const url = location.href.split('?')[0] + '?ref=share&from=' + respondentId;
  let shareUrl = '';
  if (platform === 'tg') shareUrl = 'https://t.me/share/url?url='+encodeURIComponent(url)+'&text='+encodeURIComponent(text);
  else if (platform === 'vk') shareUrl = 'https://vk.com/share.php?url='+encodeURIComponent(url)+'&title='+encodeURIComponent(text);
  // Log share event
  logEvent('share_'+platform, champName);
  window.open(shareUrl, '_blank');
}

function submitTgHandle() {
  const input = document.getElementById('tgHandle');
  const handle = (input.value||'').trim();
  if (!handle) return;
  logEvent('tg_signup', handle);
  document.getElementById('tgSubmitBtn').disabled = true;
  document.getElementById('tgSuccess').style.display = 'block';
  input.disabled = true;
}

function logEvent(eventType, value) {
  const ref = sessionStorage.getItem('neuroom_ref') || '';
  const data = { timestamp: new Date().toISOString(), event: eventType, value: value, respondent_id: respondentId, referred_by: ref };
  if (GOOGLE_SCRIPT_URL) {
    try { fetch(GOOGLE_SCRIPT_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) }); } catch(e) {}
  }
  // Also save locally
  const k = 'neuroom_hwdensity_events';
  const e = JSON.parse(localStorage.getItem(k)||'[]');
  e.push(data);
  localStorage.setItem(k, JSON.stringify(e));
}

// ── Confetti ──
const cc = document.getElementById('confetti');
const cx = cc.getContext('2d');
let cp = [], cr = false;
function resizeC(){cc.width=innerWidth;cc.height=innerHeight}
addEventListener('resize',resizeC);resizeC();
function launchConfetti(){
  cp=[];const cols=['#7c5cfc','#a78bfa','#ec4899','#34d399','#f59e0b','#60a5fa'];
  for(let i=0;i<60;i++) cp.push({x:cc.width/2+(Math.random()-.5)*120,y:cc.height*.4,vx:(Math.random()-.5)*10,vy:-8-Math.random()*10,sz:4+Math.random()*6,c:cols[Math.floor(Math.random()*cols.length)],r:Math.random()*360,rs:(Math.random()-.5)*10,l:1});
  if(!cr){cr=true;animC();}
}
function animC(){
  cx.clearRect(0,0,cc.width,cc.height);
  cp=cp.filter(p=>p.l>0);
  if(!cp.length){cr=false;return;}
  cp.forEach(p=>{p.x+=p.vx;p.vy+=.3;p.y+=p.vy;p.r+=p.rs;p.l-=.008;cx.save();cx.translate(p.x,p.y);cx.rotate(p.r*Math.PI/180);cx.globalAlpha=Math.max(0,p.l);cx.fillStyle=p.c;cx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);cx.restore()});
  requestAnimationFrame(animC);
}

if (window.visualViewport) {
  const nav = document.getElementById('nav');
  function adjustNav() {
    const vv = window.visualViewport;
    const offset = window.innerHeight - vv.height - vv.offsetTop;
    nav.style.bottom = offset > 50 ? offset + 'px' : '';
  }
  window.visualViewport.addEventListener('resize', adjustNav);
  window.visualViewport.addEventListener('scroll', adjustNav);
}

document.addEventListener('focusin', e => {
  if (e.target.matches('textarea')) {
    setTimeout(() => e.target.scrollIntoView({behavior:'smooth',block:'center'}), 300);
  }
});

// ══════════════════════════════════════
// SHARE LANDING (для перехода по ссылке)
// ══════════════════════════════════════

  const app = document.getElementById('app');
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('nav').style.display = 'none';
  logEvent('share_landing', '');

  app.innerHTML = `
  <div class="screen active anim" style="align-items:center">
    <div class="welcome-icon">&#127942;</div>
    <div class="welcome-title">Чемпионат экранов Neuroom</div>
    <div class="finish-sub">Твой друг прошёл чемпионат и выбрал лучший экран для домашних заданий. Попробуй и ты!</div>

    <div style="margin-top:12px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:14px;width:100%">
      <div style="font-size:14px;font-weight:600;margin-bottom:8px;text-align:center">Хочешь участвовать в продуктовых исследованиях Neuroom?</div>
      <div style="font-size:12px;color:var(--text-dim);text-align:center;margin-bottom:10px">Оставь свой Telegram — мы напишем, когда понадобится твоё мнение</div>
      <div style="display:flex;gap:8px">
        <input type="text" id="tgHandle" placeholder="@username" style="flex:1;background:var(--input-bg);border:2px solid var(--border);border-radius:12px;color:var(--text);font-size:16px;font-family:inherit;padding:12px;outline:none;text-align:center;letter-spacing:0">
        <button onclick="submitTgHandle()" id="tgSubmitBtn" style="padding:12px 16px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap">Отправить</button>
      </div>
      <div id="tgSuccess" style="display:none;text-align:center;color:var(--success);font-size:13px;font-weight:600;margin-top:8px">&#10004; Записали! Напишем.</div>
    </div>

    <div style="width:100%;margin-top:12px">
      <a href="${location.pathname}" style="display:block;text-align:center;padding:16px 20px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#9333ea);color:#fff;font-size:16px;font-weight:700;text-decoration:none;font-family:inherit;box-shadow:0 4px 15px var(--accent-glow)">Пройти чемпионат самому</a>
    </div>
  </div>`;
}

// ── Init ──
const _params = new URLSearchParams(location.search);
const _ref = _params.get('ref');
const _refId = _params.get('from') || '';
// Store referrer for this session
if (_refId) sessionStorage.setItem('neuroom_ref', _refId);

if (_ref === 'share') {
  renderShareLanding();
} else {
  render();
}
</script>
