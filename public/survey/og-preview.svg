<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Blobs -->
  <circle cx="100" cy="80" r="200" fill="#7c5cfc" opacity="0.08" filter="url(#blur)"/>
  <circle cx="1100" cy="550" r="180" fill="#a78bfa" opacity="0.06"/>
  <!-- Trophy -->
  <text x="600" y="200" text-anchor="middle" font-size="120" fill="#f59e0b">&#127942;</text>
  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="#e8e8f0">
    Чемпионат экранов
  </text>
  <text x="600" y="375" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="#a78bfa">
    Neuroom
  </text>
  <!-- Subtitle -->
  <text x="600" y="440" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" fill="#8888a0">
    Выбери лучший экран для домашних заданий
  </text>
  <!-- CTA pill -->
  <rect x="420" y="480" width="360" height="56" rx="28" fill="url(#accent)"/>
  <text x="600" y="516" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#ffffff">
    Пройти за 5 минут
  </text>
  <!-- Bottom bar -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#gold)"/>
</svg>
